<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Diksha!</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
        .animate-fall {
            animation: fall 3s linear forwards;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Simple Icon Component to handle Lucide icons in a CDN environment
        const Icon = ({ name, className = "w-5 h-5" }) => {
            useEffect(() => {
                lucide.createIcons();
            }, []);
            return <i data-lucide={name} className={className}></i>;
        };

        const App = () => {
            const [isPartyMode, setIsPartyMode] = useState(false);
            const [showConfetti, setShowConfetti] = useState(false);

            const triggerParty = () => {
                setIsPartyMode(true);
                setShowConfetti(true);
                setTimeout(() => setShowConfetti(false), 5000);
            };

            const skills = ["Next.js", "React", "Spring Boot", "Node.js", "TypeScript", "A/B Testing"];

            const photos = [
                { src: "images/IMG-20170625-WA0012.jpg", alt: "Memory 1" },
                { src: "images/IMG-20210911-WA0043.jpg", alt: "Memory 2" },
                { src: "images/IMG-20241231-WA0029.jpg", alt: "Memory 3" },
                { src: "images/IMG_20181018_153127.jpg", alt: "Memory 4" },
                { src: "images/IMG_20190617_131339.jpg", alt: "Memory 5" },
                { src: "images/IMG_20221018_184556.jpg", alt: "Memory 6" },
                { src: "images/IMG_20230228_143402.jpg", alt: "Memory 7" },
            ];

            const milestones = [
                {
                    year: "Present",
                    title: "SDE @ Cactus Communications",
                    desc: "Revolutionizing academic writing with the Paperpal team.",
                    icon: "briefcase"
                },
                {
                    year: "2024",
                    title: "Software Engineer Intern @ Cactus",
                    desc: "Migrated Paperpal to Strapi and optimized Clevertap tracking.",
                    icon: "code-2"
                },
                {
                    year: "2022",
                    title: "SDE Intern @ BIK",
                    desc: "Developed automated messaging tools and React Native components.",
                    icon: "terminal"
                },
                {
                    year: "2020-2023",
                    title: "Delhi University",
                    desc: "B.Sc. in Computer Science - Where the journey began.",
                    icon: "graduation-cap"
                }
            ];

            return (
                <div className={`min-h-screen transition-colors duration-700 ${isPartyMode ? 'bg-indigo-950 text-white' : 'bg-slate-50 text-slate-900'}`}>
                    {/* Floating Confetti Animation */}
                    {showConfetti && (
                        <div className="fixed inset-0 pointer-events-none z-50 overflow-hidden">
                            {[...Array(50)].map((_, i) => (
                                <div
                                    key={i}
                                    className="absolute animate-fall"
                                    style={{
                                        left: `${Math.random() * 100}%`,
                                        top: `-10%`,
                                        backgroundColor: ['#F472B6', '#60A5FA', '#FBBF24', '#34D399'][Math.floor(Math.random() * 4)],
                                        width: '10px',
                                        height: '10px',
                                        borderRadius: '50%',
                                        animationDelay: `${Math.random() * 2}s`,
                                        opacity: Math.random()
                                    }}
                                />
                            ))}
                        </div>
                    )}

                    {/* Hero Section */}
                    <header className="relative py-20 px-6 flex flex-col items-center justify-center text-center overflow-hidden">
                        <div className={`absolute inset-0 opacity-10 ${isPartyMode ? 'bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-pink-500 via-transparent to-transparent' : ''}`} />
                        
                        <div className="z-10">
                            <div className="inline-flex items-center justify-center p-2 px-4 rounded-full bg-indigo-100 text-indigo-600 mb-6 font-medium text-sm">
                                <Icon name="sparkles" className="w-4 h-4 mr-2" />
                                It's a special day!
                            </div>
                            <h1 className="text-5xl md:text-7xl font-bold tracking-tight mb-4">
                                Happy Birthday, <span className="text-transparent bg-clip-text bg-gradient-to-r from-indigo-500 to-pink-500">Diksha!</span>
                            </h1>
                            <p className="text-lg md:text-xl text-slate-500 max-w-2xl mx-auto mb-8 font-light">
                                SDE, Problem Solver, and Paperpal's tech wizard. Here's to another year of pushing code and breaking boundaries!
                            </p>
                            
                            <button 
                                onClick={triggerParty}
                                className="group relative px-8 py-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl font-semibold transition-all hover:scale-105 active:scale-95 shadow-xl shadow-indigo-200"
                            >
                                <div className="flex items-center gap-2">
                                    <Icon name="cake" className="w-5 h-5 group-hover:animate-bounce" />
                                    <span>Celebrate Now!</span>
                                </div>
                            </button>
                        </div>
                    </header>

                    {/* Memory Gallery Section */}
                    <section className="max-w-6xl mx-auto px-6 py-12">
                        <div className="flex items-center justify-center gap-3 mb-10">
                            <Icon name="camera" className="text-pink-500 w-8 h-8" />
                            <h2 className="text-3xl font-bold">Memory Gallery</h2>
                        </div>
                        
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            {/* Highlighted Image */}
                            <div className="md:col-span-2 md:row-span-2 relative group overflow-hidden rounded-3xl shadow-xl border-4 border-white">
                                <img 
                                    src="images/IMG_20190617_132659.jpg" 
                                    alt="Birthday Highlight" 
                                    className="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110"
                                    onError={(e) => { e.target.src = 'https://via.placeholder.com/800x600?text=Birthday+Highlight'; }}
                                />
                                <div className="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-end p-8">
                                    <p className="text-white font-medium text-xl">The Highlight of the Day ✨</p>
                                </div>
                            </div>

                            {/* Grid of Other Photos */}
                            {photos.map((photo, index) => (
                                <div key={index} className="relative group overflow-hidden rounded-2xl shadow-lg border-2 border-white aspect-square">
                                    <img 
                                        src={photo.src} 
                                        alt={photo.alt} 
                                        className="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110"
                                        onError={(e) => { e.target.src = `https://via.placeholder.com/400?text=Memory+${index + 1}`; }}
                                    />
                                    <div className="absolute inset-0 bg-indigo-600/20 opacity-0 group-hover:opacity-100 transition-opacity" />
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* Terminal Section */}
                    <section className="max-w-4xl mx-auto px-6 py-12">
                        <div className="bg-slate-900 rounded-2xl shadow-2xl overflow-hidden border border-slate-800">
                            <div className="bg-slate-800 px-4 py-2 flex items-center gap-2">
                                <div className="w-3 h-3 rounded-full bg-red-500" />
                                <div className="w-3 h-3 rounded-full bg-yellow-500" />
                                <div className="w-3 h-3 rounded-full bg-green-500" />
                                <span className="ml-2 text-xs text-slate-400 font-mono">birthday_script.js</span>
                            </div>
                            <div className="p-6 font-mono text-sm md:text-base leading-relaxed text-indigo-300">
                                <p className="mb-2"><span className="text-pink-400">const</span> <span className="text-blue-400">diksha</span> = &#123;</p>
                                <p className="pl-6 mb-1">role: <span className="text-green-400">"Software Engineer"</span>,</p>
                                <p className="pl-6 mb-1">team: <span className="text-green-400">"Paperpal @ Cactus"</span>,</p>
                                <p className="pl-6 mb-1">strengths: [<span className="text-green-400">"Problem Solving"</span>, <span className="text-green-400">"Clean Code"</span>],</p>
                                <p className="pl-6 mb-1">birthday: <span className="text-yellow-400">true</span>,</p>
                                <p className="pl-6 mb-2">wishes: <span className="text-indigo-400">"Infinite success && happiness"</span></p>
                                <p className="mb-2">&#125;;</p>
                                <p className="text-slate-500 italic">// Running birthday celebration...</p>
                                <p className="text-green-400">{" > "} diksha.celebrate();</p>
                                <p className="text-white mt-4 font-bold">"Happy Birthday Diksha! May your components always mount and your builds never fail!" 🚀</p>
                            </div>
                        </div>
                    </section>

                    {/* Career Timeline */}
                    <section className="max-w-5xl mx-auto px-6 py-20">
                        <h2 className="text-3xl font-bold mb-12 text-center flex items-center justify-center gap-3">
                            <Icon name="award" className="text-indigo-500 w-8 h-8" />
                            Professional Journey
                        </h2>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                            {milestones.map((m, i) => (
                                <div key={i} className={`p-6 rounded-2xl border transition-all hover:shadow-lg ${isPartyMode ? 'bg-indigo-900/50 border-indigo-700' : 'bg-white border-slate-200'}`}>
                                    <div className="w-10 h-10 rounded-xl bg-indigo-100 text-indigo-600 flex items-center justify-center mb-4">
                                        <Icon name={m.icon} />
                                    </div>
                                    <span className="text-xs font-bold text-indigo-500 uppercase tracking-wider">{m.year}</span>
                                    <h3 className="font-bold text-lg mt-1 mb-2">{m.title}</h3>
                                    <p className={`text-sm ${isPartyMode ? 'text-indigo-200' : 'text-slate-600'}`}>{m.desc}</p>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* Skills */}
                    <section className="py-20 bg-indigo-600 text-white">
                        <div className="max-w-4xl mx-auto px-6 text-center">
                            <h2 className="text-3xl font-bold mb-8">Mastered Stack</h2>
                            <div className="flex flex-wrap justify-center gap-4">
                                {skills.map((skill) => (
                                    <span 
                                        key={skill} 
                                        className="px-6 py-3 bg-white/10 backdrop-blur-md rounded-full border border-white/20 hover:bg-white/20 transition-colors font-medium"
                                    >
                                        {skill}
                                    </span>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="py-12 px-6 text-center">
                        <div className="flex justify-center gap-6 mb-8">
                            <a href="mailto:diksha.takyar@gmail.com" className="p-3 rounded-full bg-slate-100 hover:bg-indigo-100 text-slate-600 hover:text-indigo-600 transition-all">
                                <Icon name="mail" />
                            </a>
                            <a href="https://www.linkedin.com/in/dikshatakyar" target="_blank" className="p-3 rounded-full bg-slate-100 hover:bg-indigo-100 text-slate-600 hover:text-indigo-600 transition-all">
                                <Icon name="linkedin" />
                            </a>
                            <div className="p-3 rounded-full bg-slate-100 text-slate-600">
                                <Icon name="github" />
                            </div>
                        </div>
                        <p className="text-slate-500 text-sm">
                            Built with <Icon name="heart" className="inline w-4 h-4 text-pink-500 fill-current" /> for Diksha
                        </p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
