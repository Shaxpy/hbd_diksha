<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Diksha!</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
        .animate-fall {
            animation: fall 3s linear forwards;
        }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Helper for Lucide Icons
        const Icon = ({ name, className = "w-5 h-5" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const App = () => {
            const [isPartyMode, setIsPartyMode] = useState(false);
            const [showConfetti, setShowConfetti] = useState(false);

            const triggerParty = () => {
                setIsPartyMode(true);
                setShowConfetti(true);
                setTimeout(() => setShowConfetti(false), 5000);
            };

            const skills = ["Next.js", "React", "Spring Boot", "Node.js", "TypeScript", "A/B Testing"];

            const photos = [
                { src: "images/IMG-20170625-WA0012.jpg", alt: "Memory 1" },
                { src: "images/IMG-20210911-WA0043.jpg", alt: "Memory 2" },
                { src: "images/IMG-20241231-WA0029.jpg", alt: "Memory 3" },
                { src: "images/IMG_20181018_153127.jpg", alt: "Memory 4" },
                { src: "images/IMG_20190617_131339.jpg", alt: "Memory 5" },
                { src: "images/IMG_20221018_184556.jpg", alt: "Memory 6" },
                { src: "images/IMG_20230228_143402.jpg", alt: "Memory 7" },
            ];

            const milestones = [
                {
                    year: "Present",
                    title: "SDE @ Cactus Communications",
                    desc: "Revolutionizing academic writing with the Paperpal team.",
                    icon: "briefcase"
                },
                {
                    year: "2024",
                    title: "Software Engineer Intern @ Cactus",
                    desc: "Migrated Paperpal to Strapi and optimized content systems.",
                    icon: "code-2"
                },
                {
                    year: "2022",
                    title: "SDE Intern @ BIK",
                    desc: "Developed automated messaging tools and React Native apps.",
                    icon: "terminal"
                },
                {
                    year: "2020-2023",
                    title: "Delhi University",
                    desc: "B.Sc. in Computer Science - The foundation of it all.",
                    icon: "graduation-cap"
                }
            ];

            return (
                <div className={`min-h-screen transition-colors duration-700 ${isPartyMode ? 'bg-indigo-950 text-white' : 'bg-slate-50 text-slate-900'}`}>
                    
                    {/* Confetti overlay */}
                    {showConfetti && (
                        <div className="fixed inset-0 pointer-events-none z-50 overflow-hidden">
                            {[...Array(60)].map((_, i) => (
                                <div
                                    key={i}
                                    className="absolute animate-fall"
                                    style={{
                                        left: `${Math.random() * 100}%`,
                                        top: `-5%`,
                                        backgroundColor: ['#F472B6', '#60A5FA', '#FBBF24', '#34D399', '#A78BFA'][Math.floor(Math.random() * 5)],
                                        width: `${Math.random() * 8 + 6}px`,
                                        height: `${Math.random() * 8 + 6}px`,
                                        borderRadius: Math.random() > 0.5 ? '50%' : '2px',
                                        animationDelay: `${Math.random() * 3}s`,
                                        animationDuration: `${Math.random() * 2 + 2}s`,
                                        opacity: Math.random() * 0.7 + 0.3
                                    }}
                                />
                            ))}
                        </div>
                    )}

                    {/* Hero Section */}
                    <header className="relative py-24 px-6 flex flex-col items-center justify-center text-center overflow-hidden">
                        <div className={`absolute inset-0 opacity-20 ${isPartyMode ? 'bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-indigo-500 via-transparent to-transparent' : 'bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-indigo-200 via-transparent to-transparent'}`} />
                        
                        <div className="z-10 max-w-4xl mx-auto">
                            <div className="inline-flex items-center justify-center p-2 px-4 rounded-full bg-indigo-100 text-indigo-600 mb-8 font-semibold text-sm tracking-wide shadow-sm">
                                <Icon name="sparkles" className="w-4 h-4 mr-2" />
                                CELEBRATING DIKSHA'S SPECIAL DAY
                            </div>
                            <h1 className="text-6xl md:text-8xl font-black tracking-tight mb-6 leading-tight">
                                Happy Birthday, <br/>
                                <span className="text-transparent bg-clip-text bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500">
                                    Diksha!
                                </span>
                            </h1>
                            <p className={`text-xl md:text-2xl max-w-2xl mx-auto mb-10 font-light ${isPartyMode ? 'text-indigo-200' : 'text-slate-600'}`}>
                                SDE @ Cactus | Next.js Enthusiast | Problem Solver. <br/>
                                Here's to a bug-free year full of growth and joy!
                            </p>
                            
                            <button 
                                onClick={triggerParty}
                                className="group relative px-10 py-5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl font-bold transition-all hover:scale-105 active:scale-95 shadow-2xl shadow-indigo-300 flex items-center gap-3 mx-auto"
                            >
                                <Icon name="cake" className="w-6 h-6 group-hover:animate-bounce" />
                                <span>Start the Party!</span>
                            </button>
                        </div>
                    </header>

                    {/* Memory Gallery */}
                    <section className="max-w-6xl mx-auto px-6 py-20">
                        <div className="flex flex-col items-center mb-12">
                            <div className="w-12 h-12 bg-pink-100 rounded-2xl flex items-center justify-center mb-4 text-pink-500">
                                <Icon name="camera" className="w-6 h-6" />
                            </div>
                            <h2 className="text-4xl font-bold">Captured Moments</h2>
                        </div>
                        
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            {/* Highlighted Image */}
                            <div className="md:col-span-2 md:row-span-2 relative group overflow-hidden rounded-[2.5rem] shadow-2xl border-8 border-white">
                                <img 
                                    src="images/IMG_20190617_132659.jpg" 
                                    alt="Highlight" 
                                    className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110"
                                    onError={(e) => { e.target.src = 'https://via.placeholder.com/800x600?text=Birthday+Highlight'; }}
                                />
                                <div className="absolute inset-0 bg-gradient-to-t from-black/70 via-black/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex flex-col justify-end p-10">
                                    <h3 className="text-white text-3xl font-bold mb-2">The Best Times ✨</h3>
                                    <p className="text-indigo-200">Celebrating another amazing year of you.</p>
                                </div>
                            </div>

                            {/* Small Photos */}
                            {photos.map((photo, index) => (
                                <div key={index} className="relative group overflow-hidden rounded-3xl shadow-lg border-4 border-white aspect-square">
                                    <img 
                                        src={photo.src} 
                                        alt={photo.alt} 
                                        className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110"
                                        onError={(e) => { e.target.src = `https://via.placeholder.com/400?text=Memory+${index + 1}`; }}
                                    />
                                    <div className="absolute inset-0 bg-indigo-600/30 opacity-0 group-hover:opacity-100 transition-opacity" />
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* Terminal Section */}
                    <section className="max-w-4xl mx-auto px-6 py-16">
                        <div className="bg-slate-900 rounded-3xl shadow-2xl overflow-hidden border border-slate-700">
                            <div className="bg-slate-800 px-6 py-3 flex items-center justify-between border-b border-slate-700">
                                <div className="flex gap-2">
                                    <div className="w-3 h-3 rounded-full bg-red-500" />
                                    <div className="w-3 h-3 rounded-full bg-yellow-500" />
                                    <div className="w-3 h-3 rounded-full bg-green-500" />
                                </div>
                                <span className="text-xs text-slate-400 font-mono tracking-widest uppercase">diksha_celebration.js</span>
                            </div>
                            <div className="p-8 font-mono text-sm md:text-base leading-relaxed text-indigo-300">
                                <p className="mb-2"><span className="text-pink-400">const</span> <span className="text-blue-400">diksha</span> = &#123;</p>
                                <p className="pl-8 mb-1">role: <span className="text-green-400">"SDE @ Cactus Communications"</span>,</p>
                                <p className="pl-8 mb-1">skills: [<span className="text-green-400">"React"</span>, <span className="text-green-400">"Next.js"</span>, <span className="text-green-400">"Spring Boot"</span>],</p>
                                <p className="pl-8 mb-1">status: <span className="text-yellow-400">"Living her best life"</span>,</p>
                                <p className="pl-8 mb-1">birthday: <span className="text-yellow-400">true</span>,</p>
                                <p className="pl-8 mb-2">wishes: <span className="text-indigo-400">"Success, laughter, and zero bugs"</span></p>
                                <p className="mb-4">&#125;;</p>
                                <div className="p-4 bg-indigo-900/30 border border-indigo-500/30 rounded-xl">
                                    <p className="text-indigo-400 font-bold italic mb-2">// Executing birthday command...</p>
                                    <p className="text-green-400 font-bold">{" > "} diksha.celebrate();</p>
                                    <p className="text-white mt-4 text-xl font-bold">"Happy Birthday Diksha! 🚀 Your code is clean, but today, your party should be loud!"</p>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Career Timeline */}
                    <section className="max-w-5xl mx-auto px-6 py-24">
                        <div className="text-center mb-16">
                            <h2 className="text-4xl font-bold flex items-center justify-center gap-4">
                                <Icon name="award" className="text-indigo-500 w-10 h-10" />
                                Professional Milestones
                            </h2>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                            {milestones.map((m, i) => (
                                <div key={i} className={`group p-8 rounded-[2rem] border-2 transition-all hover:shadow-2xl hover:-translate-y-2 ${isPartyMode ? 'bg-indigo-900/40 border-indigo-700' : 'bg-white border-slate-100 shadow-xl shadow-slate-200'}`}>
                                    <div className="w-14 h-14 rounded-2xl bg-indigo-100 text-indigo-600 flex items-center justify-center mb-6 group-hover:scale-110 transition-transform">
                                        <Icon name={m.icon} className="w-7 h-7" />
                                    </div>
                                    <span className="text-xs font-black text-indigo-500 uppercase tracking-[0.2em]">{m.year}</span>
                                    <h3 className="font-bold text-xl mt-2 mb-3">{m.title}</h3>
                                    <p className={`text-sm leading-relaxed ${isPartyMode ? 'text-indigo-200' : 'text-slate-600'}`}>{m.desc}</p>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* Skills Section */}
                    <section className="py-24 bg-gradient-to-br from-indigo-600 to-purple-700 text-white overflow-hidden relative">
                        <div className="absolute top-0 left-0 w-full h-full opacity-10 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]"></div>
                        <div className="max-w-4xl mx-auto px-6 text-center relative z-10">
                            <h2 className="text-4xl font-bold mb-12">Expertise Stack</h2>
                            <div className="flex flex-wrap justify-center gap-5">
                                {skills.map((skill) => (
                                    <span 
                                        key={skill} 
                                        className="px-8 py-4 bg-white/10 backdrop-blur-xl rounded-2xl border border-white/20 hover:bg-white/30 transition-all font-bold text-lg shadow-lg hover:scale-110 cursor-default"
                                    >
                                        {skill}
                                    </span>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="py-20 px-6 text-center">
                        <div className="flex justify-center gap-8 mb-10">
                            <a href="mailto:diksha.takyar@gmail.com" className="p-4 rounded-2xl bg-white shadow-lg text-slate-400 hover:text-indigo-600 hover:shadow-indigo-100 transition-all">
                                <Icon name="mail" className="w-6 h-6" />
                            </a>
                            <a href="https://www.linkedin.com/in/dikshatakyar" target="_blank" className="p-4 rounded-2xl bg-white shadow-lg text-slate-400 hover:text-blue-600 hover:shadow-blue-100 transition-all">
                                <Icon name="linkedin" className="w-6 h-6" />
                            </a>
                            <div className="p-4 rounded-2xl bg-white shadow-lg text-slate-400 transition-all">
                                <Icon name="github" className="w-6 h-6" />
                            </div>
                        </div>
                        <p className={`text-lg font-medium ${isPartyMode ? 'text-indigo-300' : 'text-slate-500'}`}>
                            Built with <Icon name="heart" className="inline w-5 h-5 text-pink-500 fill-current animate-pulse mx-1" /> for Diksha's Birthday
                        </p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
